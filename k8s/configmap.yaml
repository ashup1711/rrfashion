apiVersion: v1
kind: ConfigMap
metadata:
  name: rrfashion-config
  namespace: rrfashion
data:
  NODE_ENV: "production"
  PORT: "3000"
  DATABASE_URL: "postgresql://postgres:postgres@host.minikube.internal:5433/rr_fashion?schema=public"
  REDIS_HOST: "host.minikube.internal"
  REDIS_PORT: "6379"
  MINIO_ENDPOINT: "host.minikube.internal"
  MINIO_PORT: "9000"
  MINIO_BUCKET: "rrfashion"
  MINIO_USE_SSL: "false"
  JWT_EXPIRES_IN: "15m"
  JWT_ADMIN_EXPIRES_IN: "15m"
  REFRESH_EXPIRES_IN: "7d"
  BCRYPT_SALT_ROUNDS: "12"
