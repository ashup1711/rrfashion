apiVersion: apps/v1
kind: Deployment
metadata:
  name: rrfashion-api
  namespace: rrfashion
  labels:
    app: rrfashion-api
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: rrfashion-api
  template:
    metadata:
      labels:
        app: rrfashion-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/api/metrics"
    spec:
      initContainers:
        - name: prisma-migrate
          image: rrfashion/backend:latest
          imagePullPolicy: IfNotPresent
          command: ["npx", "prisma", "migrate", "deploy"]
          envFrom:
            - configMapRef:
                name: rrfashion-config
            - secretRef:
                name: rrfashion-secrets
      containers:
        - name: api
          image: rrfashion/backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: rrfashion-config
            - secretRef:
                name: rrfashion-secrets
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/ready
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
---
apiVersion: v1
kind: Service
metadata:
  name: rrfashion-api
  namespace: rrfashion
spec:
  selector:
    app: rrfashion-api
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
