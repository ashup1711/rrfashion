apiVersion: apps/v1
kind: Deployment
metadata:
  name: rrfashion-api
  namespace: rrfashion
  labels:
    app: rrfashion-api
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: rrfashion-api
  template:
    metadata:
      labels:
        app: rrfashion-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/api/metrics"
    spec:
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - |
              echo "Waiting for postgres..."
              until pg_isready -h postgres -p 5432 -U postgres; do
                echo "Postgres not ready, retrying in 2s..."
                sleep 2
              done
              echo "Postgres is ready!"
        - name: wait-for-redis
          image: redis:7-alpine
          command:
            - sh
            - -c
            - |
              echo "Waiting for redis..."
              until redis-cli -h redis -p 6379 ping; do
                echo "Redis not ready, retrying in 2s..."
                sleep 2
              done
              echo "Redis is ready!"
        - name: prisma-migrate
          image: rrfashion/backend:latest
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              echo "Running prisma migrate deploy..."
              npx prisma migrate deploy
              echo "Migration complete!"
          envFrom:
            - configMapRef:
                name: rrfashion-config
            - secretRef:
                name: rrfashion-secrets
      containers:
        - name: api
          image: rrfashion/backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: rrfashion-config
            - secretRef:
                name: rrfashion-secrets
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/ready
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 60
---
apiVersion: v1
kind: Service
metadata:
  name: rrfashion-api
  namespace: rrfashion
spec:
  selector:
    app: rrfashion-api
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
