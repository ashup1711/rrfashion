name: Deploy

on:
  push:
    branches: [main]

permissions:
  packages: write
  contents: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/rrfashion-backend

jobs:
  build-and-push:
    runs-on: [self-hosted, macos]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        shell: bash
        env:
          GHCR_USER: ${{ github.repository_owner }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p $HOME/.docker
          AUTH=$(printf "%s:%s" "$GHCR_USER" "$GHCR_TOKEN" | base64)
          cat > $HOME/.docker/config.json << EOF
          {
            "auths": {
              "${{ env.REGISTRY }}": {
                "auth": "$AUTH"
              }
            }
          }
          EOF

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy-backend:
    needs: build-and-push
    runs-on: [self-hosted, macos]
    steps:
      - uses: actions/checkout@v4

      - name: Check Docker
        shell: bash
        run: docker info

      - name: Setup kind cluster
        shell: bash
        run: |
          # Install kind
          if ! command -v kind &>/dev/null; then
            if command -v brew &>/dev/null; then
              brew install kind
            else
              KIND_VERSION=v0.31.0
              mkdir -p $HOME/.local/bin
              ARCH=amd64
              [ "$(uname -m)" = arm64 ] && ARCH=arm64
              curl -sfL --retry 3 \
                "https://github.com/kubernetes-sigs/kind/releases/download/$KIND_VERSION/kind-darwin-$ARCH" \
                -o $HOME/.local/bin/kind
              chmod +x $HOME/.local/bin/kind
              export PATH="$HOME/.local/bin:$PATH"
            fi
          fi
          kind version

          # Create cluster
          kind create cluster --name rrfashion --wait 60s
          kubectl cluster-info --context kind-rrfashion

      - name: Build and load Docker image into kind
        env:
          IMG: rrfashion-backend:${{ github.sha }}
        run: |
          docker build -t $IMG backend
          kind load docker-image $IMG --name rrfashion

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/deployment.yaml

      - name: Update deployment image
        env:
          IMG: rrfashion-backend:${{ github.sha }}
        run: |
          kubectl set image deployment/rrfashion-api -n rrfashion \
            api=$IMG

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/rrfashion-api -n rrfashion --timeout=300s

  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/dist
