name: Deploy

on:
  push:
    branches: [main]

permissions:
  packages: write
  contents: write
  pages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/rrfashion-backend

jobs:
  build-and-push:
    runs-on: [self-hosted, macos]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        shell: bash
        env:
          GHCR_USER: ${{ github.repository_owner }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p $HOME/.docker
          AUTH=$(printf "%s:%s" "$GHCR_USER" "$GHCR_TOKEN" | base64)
          cat > $HOME/.docker/config.json << EOF
          {
            "auths": {
              "${{ env.REGISTRY }}": {
                "auth": "$AUTH"
              }
            }
          }
          EOF

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy-backend:
    needs: build-and-push
    runs-on: [self-hosted, macos]
    env:
      COMPOSE_PROJECT_NAME: rrfashion-ci
      COMPOSE_FILE: docker-compose.yml:docker-compose.ci.yml
    steps:
      - uses: actions/checkout@v4

      - name: Check Docker
        shell: bash
        run: docker info

      - name: Clean up previous CI deployment
        shell: bash
        run: docker compose down --remove-orphans

      - name: Start dependencies (PostgreSQL, Redis, MinIO)
        shell: bash
        run: |
          docker compose up -d postgres redis minio --wait
          echo "Dependencies ready"

      - name: Build and start backend
        shell: bash
        run: |
          docker compose up -d backend --build --wait
          echo "Backend started"

      - name: Verify deployment
        shell: bash
        run: |
          docker compose exec -T backend \
            curl -sf http://localhost:3000/api/health && echo "Health OK"

      - name: Clean up
        if: always()
        shell: bash
        run: docker compose down --remove-orphans

  deploy-frontend:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Inject runtime API URL
        working-directory: frontend
        run: |
          API_URL='${{ vars.FRONTEND_API_URL }}'
          if [ -z "$API_URL" ]; then API_URL='http://localhost:3000/api'; fi
          echo "window.__RUNTIME_ENV__ = { API_URL: '$API_URL' };" > dist/runtime-env.js

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./frontend/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
