name: Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/rrfashion-backend

jobs:
  build-and-push:
    runs-on: [self-hosted, macos]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        shell: bash
        run: |
          # Disable macOS keychain and use file-based cred store
          mkdir -p $HOME/.docker
          cat > $HOME/.docker/config.json << 'EOF'
          {
            "credsStore": ""
          }
          EOF
          echo "${{ secrets.REGISTRY_PASS }}" | docker login ${{ env.REGISTRY }} \
            -u ${{ github.repository_owner }} --password-stdin

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: [self-hosted, macos]
    steps:
      - uses: actions/checkout@v4

      - name: Update kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config

      - name: Update deployment image
        run: |
          kubectl set image deployment/rrfashion-api -n rrfashion \
            api=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/rrfashion-api -n rrfashion --timeout=300s
