name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy-backend:
    runs-on: [self-hosted, macos]
    steps:
      - uses: actions/checkout@v4

      - name: Check Docker
        run: docker info

      - name: Stop and remove old containers
        run: docker compose down --remove-orphans

      - name: Build and start all services
        run: |
          docker compose up -d --build --wait --wait-timeout 180
          echo "All services started"

      - name: Verify backend health
        run: |
          docker compose exec -T backend \
            curl -sf http://localhost:3000/api/health && echo "Health OK"

      - name: Clean up on failure
        if: failure()
        run: docker compose down --remove-orphans

  deploy-frontend:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Inject runtime API URL
        working-directory: frontend
        run: |
          API_URL='${{ vars.FRONTEND_API_URL }}'
          if [ -z "$API_URL" ]; then API_URL='http://localhost:3000/api'; fi
          echo "window.__RUNTIME_ENV__ = { API_URL: '$API_URL' };" > dist/runtime-env.js

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./frontend/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
