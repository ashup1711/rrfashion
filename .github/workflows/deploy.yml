name: Deploy Frontend to GitHub Pages (with Live Backend + ngrok)

on:
  push:
    branches: [main]

# Allow one deployment per branch at a time
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # ──────────────────────────────────────────────────────────────
  # JOB 1: Start backend Docker stack + ngrok tunnel on Mac Mini
  # ──────────────────────────────────────────────────────────────
  backend-ngrok:
    runs-on: [self-hosted, macOS, ARM64]
    outputs:
      ngrok_api_url: ${{ steps.capture-ngrok-url.outputs.api_url }}
      url_status: ${{ steps.capture-ngrok-url.outputs.status }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Docker Compose Lifecycle ────────────────────────────
      - name: Docker Compose — clean shutdown
        working-directory: ${{ github.workspace }}
        run: |
          echo "=== Stopping any running containers... ==="
          docker compose down --remove-orphans
          echo "=== All containers stopped. Volumes preserved. ==="

      - name: Docker Compose — rebuild and start
        working-directory: ${{ github.workspace }}
        run: |
          echo "=== Rebuilding and starting services... ==="
          docker compose up -d --build
          echo "=== Services started. Waiting for health check... ==="

      # ── Backend Health Check ───────────────────────────────
      - name: Wait for backend health
        id: health-check
        run: |
          MAX_RETRIES=30
          for i in $(seq 1 $MAX_RETRIES); do
            if curl -sf http://localhost:3000/api/health > /dev/null 2>&1; then
              echo "Backend healthy after ${i}s"
              echo "healthy=true" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "Waiting for backend... (${i}/${MAX_RETRIES})"
            sleep 2
          done
          echo "Backend failed to become healthy within $((MAX_RETRIES * 2))s"
          echo "--- Container status ---"
          docker compose ps
          echo "--- Backend logs (last 50 lines) ---"
          docker compose logs --tail=50 backend
          echo "healthy=false" >> $GITHUB_OUTPUT
          exit 1

      # ── ngrok Lifecycle ─────────────────────────────────────
      - name: Start ngrok tunnel
        id: start-ngrok
        run: |
          echo "Killing any existing ngrok process..."
          pkill -f ngrok || true
          sleep 1

          echo "Starting ngrok tunnel to http://localhost:3000 ..."
          nohup ngrok http 3000 > /tmp/ngrok.log 2>&1 &
          NGROK_PID=$!
          echo "ngrok PID: $NGROK_PID"

          # Wait for ngrok to be ready (poll the local API)
          MAX_RETRIES=15
          for i in $(seq 1 $MAX_RETRIES); do
            if curl -sf http://localhost:4040/api/tunnels > /dev/null 2>&1; then
              echo "ngrok API ready after ${i}s"
              echo "pid=$NGROK_PID" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "Waiting for ngrok... (${i}/${MAX_RETRIES})"
            sleep 2
          done

          echo "ngrok failed to start within $((MAX_RETRIES * 2))s"
          echo "--- ngrok log ---"
          cat /tmp/ngrok.log
          echo "pid=" >> $GITHUB_OUTPUT
          exit 1

      # ── ngrok URL Capture & Validation ──────────────────────
      - name: Capture ngrok public URL
        id: capture-ngrok-url
        run: |
          NGROK_BASE_URL=$(curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url')
          echo "Raw ngrok URL: $NGROK_BASE_URL"

          # Validate URL
          if [[ -z "$NGROK_BASE_URL" || ! "$NGROK_BASE_URL" =~ ^https:// ]]; then
            echo "Invalid or empty ngrok URL. Using fallback."
            echo "status=fallback" >> $GITHUB_OUTPUT
            echo "api_url=" >> $GITHUB_OUTPUT
            exit 0  # Non-fatal — deploy will use vars.FRONTEND_API_URL
          fi

          NGROK_API_URL="${NGROK_BASE_URL}/api"
          echo "Valid ngrok API URL: $NGROK_API_URL"
          echo "status=ngrok" >> $GITHUB_OUTPUT
          echo "api_url=$NGROK_API_URL" >> $GITHUB_OUTPUT

          # Also write to file for artifact sharing
          echo "$NGROK_API_URL" > ngrok-url.txt

      # ── Diagnostics (always runs, even on failure) ─────────
      - name: Print diagnostics
        if: always()
        run: |
          echo "=== Docker Container Status ==="
          docker compose ps
          echo ""
          echo "=== ngrok Log ==="
          cat /tmp/ngrok.log 2>/dev/null || echo "(no ngrok log)"
          echo ""
          echo "=== ngrok URL (captured) ==="
          cat ngrok-url.txt 2>/dev/null || echo "(no ngrok url file)"

      # ── Upload artifact for next job ────────────────────────
      - name: Upload ngrok URL artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ngrok-url
          path: ngrok-url.txt
          retention-days: 1
          if-no-files-found: ignore

  # ──────────────────────────────────────────────────────────────
  # JOB 2: Build frontend + deploy to GitHub Pages on ubuntu
  # ──────────────────────────────────────────────────────────────
  deploy-frontend:
    needs: backend-ngrok
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Download ngrok URL from Job 1 ───────────────────────
      - name: Download ngrok URL artifact
        id: download-url
        uses: actions/download-artifact@v4
        with:
          name: ngrok-url
          path: ./
        continue-on-error: true  # Proceed even if artifact missing (fallback)

      # ── Resolve the API URL (fallback chain) ────────────────
      - name: Resolve API URL
        id: resolve-url
        run: |
          # Priority 1: ngrok URL from artifact (Job 1 succeeded with ngrok)
          if [ -f ngrok-url.txt ]; then
            NGROK_API_URL=$(cat ngrok-url.txt | tr -d '[:space:]')
            if [[ -n "$NGROK_API_URL" && "$NGROK_API_URL" =~ ^https:// ]]; then
              echo "Using ngrok URL: $NGROK_API_URL"
              echo "api_url=$NGROK_API_URL" >> $GITHUB_OUTPUT
              echo "source=ngrok" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi

          # Priority 2: vars.FRONTEND_API_URL (configured in GitHub repo)
          if [[ -n "${{ vars.FRONTEND_API_URL }}" ]]; then
            echo "Using vars.FRONTEND_API_URL: ${{ vars.FRONTEND_API_URL }}"
            echo "api_url=${{ vars.FRONTEND_API_URL }}" >> $GITHUB_OUTPUT
            echo "source=vars" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Priority 3: Hardcoded localhost fallback
          echo "No ngrok URL and no FRONTEND_API_URL variable. Using localhost fallback."
          echo "api_url=http://localhost:3000/api" >> $GITHUB_OUTPUT
          echo "source=fallback" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # ── Frontend Build ──────────────────────────────────────
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npx vite build
        env:
          VITE_API_URL: ${{ steps.resolve-url.outputs.api_url }}

      # ── Runtime Env Injection ──────────────────────────────
      - name: Inject runtime API URL into dist
        working-directory: frontend
        run: |
          API_URL="${{ steps.resolve-url.outputs.api_url }}"
          echo "Injecting API URL: $API_URL"
          cat > dist/runtime-env.js << EOF
          window.__RUNTIME_ENV__ = {
            API_URL: '${API_URL}',
          };
          EOF
          echo "Runtime env injected:"
          cat dist/runtime-env.js

      # ── Deploy to GitHub Pages ─────────────────────────────
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # ── Deployment Summary ─────────────────────────────────
      - name: Print deployment summary
        if: always()
        run: |
          echo "=========================================="
          echo "Deployment Complete"
          echo "=========================================="
          echo "API URL source: ${{ steps.resolve-url.outputs.source }}"
          echo "API URL: ${{ steps.resolve-url.outputs.api_url }}"
          echo "GitHub Pages: ${{ steps.deployment.outputs.page_url }}"
          echo "=========================================="
