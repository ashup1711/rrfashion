name: Deploy

on:
  push:
    branches: [main]

permissions:
  packages: write
  contents: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/rrfashion-backend

jobs:
  build-and-push:
    runs-on: [self-hosted, macos]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        shell: bash
        env:
          GHCR_USER: ${{ github.repository_owner }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p $HOME/.docker
          AUTH=$(printf "%s:%s" "$GHCR_USER" "$GHCR_TOKEN" | base64)
          cat > $HOME/.docker/config.json << EOF
          {
            "auths": {
              "${{ env.REGISTRY }}": {
                "auth": "$AUTH"
              }
            }
          }
          EOF

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy-backend:
    needs: build-and-push
    runs-on: [self-hosted, macos]
    steps:
      - uses: actions/checkout@v4

      - name: Setup kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: rrfashion

      - name: Build and load Docker image into kind
        env:
          IMG: rrfashion-backend:${{ github.sha }}
        run: |
          docker build -t $IMG backend
          kind load docker-image $IMG --name rrfashion

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/deployment.yaml

      - name: Update deployment image
        env:
          IMG: rrfashion-backend:${{ github.sha }}
        run: |
          kubectl set image deployment/rrfashion-api -n rrfashion \
            api=$IMG

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/rrfashion-api -n rrfashion --timeout=300s

  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/dist
