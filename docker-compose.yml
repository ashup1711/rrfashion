services:
  postgres:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    environment:
      POSTGRES_DB: rr_fashion
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    ports:
      - "${BACKEND_HOST_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/rr_fashion?schema=public"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_BUCKET: rrfashion
      MINIO_USE_SSL: "false"
      STORAGE_DRIVER: local
      UPLOAD_DIR: /app/uploads
      JWT_SECRET: "change-in-production"
      JWT_ADMIN_SECRET: "change-in-production"
      JWT_EXPIRES_IN: "15m"
      JWT_ADMIN_EXPIRES_IN: "15m"
      REFRESH_EXPIRES_IN: "7d"
      BCRYPT_SALT_ROUNDS: "12"
    command: >
      sh -c "npx prisma migrate deploy && npm run prisma:seed; node dist/main"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 120s
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  minio_data:
  backend_uploads:
